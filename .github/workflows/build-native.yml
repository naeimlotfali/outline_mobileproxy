name: Build native binaries

# Independently rebuilds the Mobileproxy Android/iOS binaries from the pinned
# outline-sdk ref (tool/OUTLINE_SDK_REF) and verifies the checked-in
# artifacts in this repo still match. Runs in the open so anyone can inspect
# the exact commands and logs that produced them, and downloads the freshly
# built artifacts as workflow artifacts for independent comparison.
#
# See NATIVE_PROVENANCE.md for what "match" means here: the generated iOS
# Objective-C header is deterministic and diffed byte-for-byte; the Android
# Java API surface is compared with javap instead of a raw jar diff, since
# the jar's bytes depend on the JDK that compiled it, not just the Go
# source; the compiled .so/Mach-O binaries are verified functionally, by
# building and running the plugin's own example app against them, rather
# than by raw binary diff (Go embeds a build ID even with -trimpath, so two
# honest rebuilds of identical source are not byte-identical).

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: build-native-${{ github.ref }}
  cancel-in-progress: true

jobs:
  android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - uses: android-actions/setup-android@v3

      - name: Install pinned Android NDK
        run: |
          yes | sdkmanager --licenses > /dev/null
          sdkmanager --install "ndk;27.0.12077973"
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/27.0.12077973" >> "$GITHUB_ENV"

      - name: Stash the currently checked-in jar for comparison
        run: cp android/libs/mobileproxy-classes.jar /tmp/checked-in-mobileproxy-classes.jar

      - name: Build Android native library from pinned ref
        run: tool/build_native.sh android

      - name: Print resolved provenance
        run: cat NATIVE_PROVENANCE.md

      - name: Verify checked-in consumer proguard rules match the pinned source
        run: |
          if ! git diff --exit-code -- android/mobileproxy-consumer-rules.pro; then
            echo "::error::android/mobileproxy-consumer-rules.pro does not match a fresh build from the ref pinned in tool/OUTLINE_SDK_REF. Run tool/build_native.sh and commit the result."
            exit 1
          fi

      - name: Verify checked-in Android API surface matches the pinned source
        run: |
          classes="mobileproxy.Mobileproxy mobileproxy.Proxy mobileproxy.StreamDialer mobileproxy.SmartDialerOptions mobileproxy.StringList mobileproxy.LogWriter mobileproxy.StrategyCache"
          # Compare public API signatures (javap), not raw jar bytes: the jar's bytes
          # depend on the JDK that compiled it, not just the pinned Go source, so a
          # byte diff would fail even when nothing meaningful changed.
          javap -p -classpath /tmp/checked-in-mobileproxy-classes.jar $classes > /tmp/checked-in-api.txt
          javap -p -classpath android/libs/mobileproxy-classes.jar $classes > /tmp/fresh-api.txt
          if ! diff -u /tmp/checked-in-api.txt /tmp/fresh-api.txt; then
            echo "::error::The Android API surface built from the ref pinned in tool/OUTLINE_SDK_REF differs from what's checked in. Run tool/build_native.sh and commit the result."
            exit 1
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: mobileproxy-android-${{ github.sha }}
          path: |
            android/libs/mobileproxy-classes.jar
            android/src/main/jniLibs

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Unit tests
        run: flutter test

      - name: Build example APK against the freshly built native library
        run: |
          cd example
          flutter pub get
          flutter build apk --debug

      - name: Runtime smoke test on an emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 30
          arch: x86_64
          profile: pixel_5
          script: |
            cd example
            flutter test integration_test/plugin_integration_test.dart -d emulator-5554

  ios:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Build iOS XCFramework from pinned ref
        run: tool/build_native.sh ios

      - name: Print resolved provenance
        run: cat NATIVE_PROVENANCE.md

      - name: Verify checked-in API surface matches the pinned source
        run: |
          header=ios/Frameworks/Mobileproxy.xcframework/ios-arm64/Mobileproxy.framework/Headers/Mobileproxy.objc.h
          if ! git diff --exit-code -- "$header"; then
            echo "::error::The generated Mobileproxy.objc.h differs from a fresh build from the ref pinned in tool/OUTLINE_SDK_REF, meaning the checked-in iOS binary's API surface is stale. Run tool/build_native.sh and commit the result."
            exit 1
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: mobileproxy-ios-${{ github.sha }}
          path: ios/Frameworks/Mobileproxy.xcframework

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Unit tests
        run: flutter test

      - name: Build example app for the simulator against the freshly built framework
        run: |
          cd example
          flutter pub get
          flutter build ios --simulator --debug --no-codesign

      - name: Runtime smoke test on the iOS Simulator
        run: |
          device=$(xcrun simctl list devices available -j | \
            python3 -c "import json,sys; d=json.load(sys.stdin)['devices']; print(next(x['udid'] for k,v in d.items() if 'iOS' in k for x in v if 'iPhone' in x['name']))")
          xcrun simctl boot "$device"
          cd example
          flutter test integration_test/plugin_integration_test.dart -d "$device"
